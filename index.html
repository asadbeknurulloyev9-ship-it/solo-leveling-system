<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqlli Sug'orish Tizimi (MVP)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f0f4f8; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { background: #2e7d32; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        
        /* IP Sozlamalari */
        .ip-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; gap: 10px; align-items: center; }
        .ip-panel input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; }
        
        /* Dashboard dizayni */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { color: #555; margin-bottom: 10px; }
        .value { font-size: 2rem; font-weight: bold; color: #2e7d32; margin-bottom: 10px; }
        
        /* Nasos boshqaruvi */
        .btn { padding: 12px 30px; font-size: 1.1rem; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-on { background-color: #2e7d32; }
        .btn-on:hover { background-color: #1b5e20; }
        .btn-off { background-color: #c62828; }
        .btn-off:hover { background-color: #b71c1c; }
        
        /* Tavsiyalar paneli */
        .recommendation { background: #e8f5e9; border-left: 5px solid #2e7d32; padding: 15px; border-radius: 5px; margin-top: 20px; }
        .recommendation h4 { color: #1b5e20; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SmartAgro - Sug'orish Boshqaruv Paneli</h1>
        <p>Datchiklar monitoringi va avtomatlashtirilgan tizim (MVP)</p>
    </header>

    <!-- Datchik IP manzilini kiritish joyi -->
    <div class="ip-panel">
        <label><strong>Datchik (ESP32) IP manzili:</strong></label>
        <input type="text" id="deviceIp" value="112.168.1.100" placeholder="Masalan: 192.168.1.100">
    </div>

    <div class="dashboard">
        <!-- Tuproq namligi kartasi -->
        <div class="card">
            <h3>Tuproq Namligi</h3>
            <div class="value" id="moistureVal">35%</div>
            <p>Xavfsiz me'yor: 40% - 70%</p>
        </div>

        <!-- Havo harorati kartasi -->
        <div class="card">
            <h3>Havo Harorati</h3>
            <div class="value" id="tempVal">32°C</div>
            <p>Bug'lanish darajasi yuqori</p>
        </div>

        <!-- Nasos holati va boshqarish -->
        <div class="card">
            <h3>Suv Nasosi Holati</h3>
            <div class="value" id="pumpStatus" style="color: #c62828;">O'CHIQ</div>
            <button id="pumpBtn" class="btn btn-on" onclick="togglePump()">Nasosni Yoqish</button>
        </div>
    </div>

    <!-- Dehqon uchun tavsiyalar -->
    <div class="recommendation">
        <h4>Agronom Tavsiyasi:</h4>
        <p id="agroAdvice">Yuklanmoqda...</p>
    </div>
</div>

<script>
    // Haqiqiy datchikdan ma'lumot olish funksiyasi (Fetch API orqali)
    async function updateDataFromSensor() {
        const ip = document.getElementById('deviceIp').value;
        
        try {
            // MVP sinov bosqichida xato bermasligi uchun quyidagi qatorlarni simulyatsiya qilamiz.
            // Haqiqiy datchik ulanganda quyidagi izohdan (//) chiqariladi:
            // const response = await fetch(`http://${ip}/status`);
            // const data = await response.json();
            
            // Hozircha sinov uchun tasodifiy (simulyatsiya) ma'lumotlar:
            let moisture = Math.floor(Math.random() * (75 - 25) + 25);
            let temperature = Math.floor(Math.random() * (38 - 22) + 22);
            
            document.getElementById('moistureVal').innerText = moisture + "%";
            document.getElementById('tempVal').innerText = temperature + "°C";
            
            // Aqlli tavsiya berish algoritmi
            let advice = "";
            if (moisture < 40) {
                advice = "Diqqat! Tuproq namligi juda past. Suv nasosini yoqish tavsiya etiladi.";
                // Avtomatik ochish funksiyasi (Agar namlik juda tushib ketsa)
                autoTurnOnPump();
            } else if (moisture >= 40 && moisture <= 70) {
                advice = "Tuproq namligi me'yorda. Ekin hozircha sug'orishga muhtoj emas.";
            } else {
                advice = "Namlik juda yuqori! Nasosni zudlik bilan o'chiring, aks holda ildiz chirishi mumkin.";
            }
            document.getElementById('agroAdvice').innerText = advice;

        } catch (error) {
            console.log("Datchik bilan aloqa o'rnatilmadi. IP manzilni tekshiring.");
        }
    }

    // Nasosni tugma orqali boshqarish (Saytdan datchikka buyruq yuborish)
    async function togglePump() {
        const ip = document.getElementById('deviceIp').value;
        const btn = document.getElementById('pumpBtn');
        const status = document.getElementById('pumpStatus');
        
        if (status.innerText === "O'CHIQ") {
            // Datchikka yoqish buyrug'ini yuborish: fetch(`http://${ip}/pump/on`)
            status.innerText = "YONIQ";
            status.style.color = "#2e7d32";
            btn.innerText = "Nasosni O'chirish";
            btn.className = "btn btn-off";
        } else {
            // Datchikka o'chirish buyrug'ini yuborish: fetch(`http://${ip}/pump/off`)
            status.innerText = "O'CHIQ";
            status.style.color = "#c62828";
            btn.innerText = "Nasosni Yoqish";
            btn.className = "btn btn-on";
        }
    }

    // Avtomatik yoqish funksiyasi
    function autoTurnOnPump() {
        const status = document.getElementById('pumpStatus');
        const btn = document.getElementById('pumpBtn');
        if (status.innerText === "O'CHIQ") {
            status.innerText = "YONIQ (AVTO)";
            status.style.color = "#2e7d32";
            btn.innerText = "Nasosni O'chirish";
            btn.className = "btn btn-off";
            alert("Avtomatlashtirish tizimi: Tuproq qurib qolgani sababli nasos avtomatik ishga tushirildi!");
        }
    }

    // Har 5 soniyada datchik ma'lumotlarini yangilab turish
    setInterval(updateDataFromSensor, 5000);
    // Sayt ochilishi bilan bir marta ishga tushirish
    updateDataFromSensor();
</script>

</body>
</html>
